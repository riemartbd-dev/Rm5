    <!-- Prevent iframe / cookie blocking SecurityErrors on storage properties -->
    <script>
      (function() {
        function createMockStorage() {
          var store = {};
          return {
            getItem: function(key) {
              return store[key] !== undefined ? store[key] : null;
            },
            setItem: function(key, value) {
              store[key] = String(value);
            },
            removeItem: function(key) {
              delete store[key];
            },
            clear: function() {
              store = {};
            },
            key: function(index) {
              var keys = Object.keys(store);
              return keys[index] || null;
            },
            get length() {
              return Object.keys(store).length;
            }
          };
        }

        function safelyDefineStorage(obj, prop, mockStore) {
          try {
            Object.defineProperty(obj, prop, {
              get: function() { return mockStore; },
              set: function() {},
              configurable: true,
              enumerable: true
            });
            return true;
          } catch (e) {
            return false;
          }
        }

        var mockLS = createMockStorage();
        var mockSS = createMockStorage();

        // 1. Check if localStorage works natively
        var lsWorking = false;
        try {
          var testLS = window.localStorage;
          if (testLS && typeof testLS.getItem === 'function') {
            testLS.getItem('__test_support__');
            lsWorking = true;
          }
        } catch (e) {
          lsWorking = false;
        }

        if (!lsWorking) {
          console.warn("localStorage security exception or restriction detected. Injecting robust polyfill.");
          var definedOnProto = false;
          if (typeof Window !== 'undefined' && Window.prototype) {
            definedOnProto = safelyDefineStorage(Window.prototype, 'localStorage', mockLS);
          }
          if (!definedOnProto) {
            var definedOnWin = safelyDefineStorage(window, 'localStorage', mockLS);
            if (!definedOnWin) {
              try {
                window.localStorage = mockLS;
              } catch (err) {
                console.warn("Could not assign window.localStorage directly:", err);
              }
            }
          }
        }

        // 2. Check if sessionStorage works natively
        var ssWorking = false;
        try {
          var testSS = window.sessionStorage;
          if (testSS && typeof testSS.getItem === 'function') {
            testSS.getItem('__test_support__');
            ssWorking = true;
          }
        } catch (e) {
          ssWorking = false;
        }

        if (!ssWorking) {
          console.warn("sessionStorage security exception or restriction detected. Injecting robust polyfill.");
          var definedOnProto = false;
          if (typeof Window !== 'undefined' && Window.prototype) {
            definedOnProto = safelyDefineStorage(Window.prototype, 'sessionStorage', mockSS);
          }
          if (!definedOnProto) {
            var definedOnWin = safelyDefineStorage(window, 'sessionStorage', mockSS);
            if (!definedOnWin) {
              try {
                window.sessionStorage = mockSS;
              } catch (err) {
                console.warn("Could not assign window.sessionStorage directly:", err);
              }
            }
          }
        }
      })();
    </script>

      <!-- High-End Luxury Splash Screen: Renders instantly before massive React JS bundles load. Safely removed once React mounts. -->
      <style>
        .splash-container {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background-color: #fafaf9; /* stone-50 */
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 99999;
          font-family: 'Space Grotesk', 'Inter', sans-serif;
        }
        .splash-logo-wrapper {
          position: relative;
          width: 160px;
          height: 160px;
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 24px;
          animation: splashFloat 3.5s ease-in-out infinite;
        }
        .splash-logo {
          width: 100%;
          height: 100%;
          display: block;
          animation: splashLogoEntrance 1.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .splash-subtitle {
          font-size: 12px;
          letter-spacing: 0.22em;
          color: #78716c; /* stone-500 */
          text-transform: uppercase;
          margin-bottom: 36px;
          font-weight: 500;
          animation: splashFadeIn 1.5s ease-out 0.3s both;
        }
        .splash-spinner {
          width: 24px;
          height: 24px;
          border: 1.5px solid rgba(28,25,23,0.08);
          border-top-color: #1c1917; /* stone-900 */
          border-radius: 50%;
          animation: splashSpin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }
        @keyframes splashLogoEntrance {
          0% { transform: scale(0.85) translateY(12px); opacity: 0; filter: blur(6px); }
          100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
        }
        @keyframes splashFadeIn {
          0% { opacity: 0; transform: translateY(4px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes splashFloat {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-8px); }
        }
        @keyframes splashSpin {
          to { transform: rotate(360deg); }
        }
      </style>
